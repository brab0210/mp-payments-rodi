<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/index.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Mono:400,500,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@araujoigor/json-grid/dist/json-grid.css"
    />
    <script src="https://unpkg.com/@araujoigor/json-grid/dist/JSONGrid.min.js"></script>
    <link
      href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      rel="stylesheet"
      id="bootstrap-css"
    />
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <title>MP-Payments-Rodi</title>
  </head>
  <body>
    <h1>MP-Payments</h1>

    <section id="container"></section>

    <form onsubmit="return getFecha()">
      <label for="data_ini">Fecha inicial</label>
      <input type="date" name="begin_date" id="date_ini" />
      <br />
      <label for="data_fin">Fecha final</label>
      <input type="date" name="end_date" id="date_fin" />
      <br />
      <button type="submit">Obtener Fecha</button>
    </form>
    <div class="card">
      <span>Fecha inicial:<span id="fecha_ini"></span></span>
      <br />
      <span>Fecha final:<span id="fecha_fin"></span></span>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
