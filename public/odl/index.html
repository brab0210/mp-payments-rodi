<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/index.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Mono:400,500,700&display=swap"
      rel="stylesheet"
    />

    <link
      href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      rel="stylesheet"
      id="bootstrap-css"
    />
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />

    <title>MP-Payments</title>
  </head>
  <body>
    <div class="sidenav">
      <div class="login-main-text">
        <h2>App Mercado Pago Payments</h2>

        <hr class="border border-light border-2 opacity-85" />

        <p>Mercado Pago Payments</p>

        <p>Ingresa tus credenciales para ingresar</p>
      </div>
    </div>
    <div class="main">
      <div class="col-md-6 col-sm-12">
        <div class="login-form">
          <form
            method="get"
            action="http://localhost:3000/mp/search-narrow?begin_date=NOW-3MONTHS&end_date=NOW"
          >
            <div class="form-group">
              <label>Usuario</label>
              <input type="text" class="form-control" />
            </div>
            <div class="form-group pass">
              <label>Contraseña</label>

              <input class="form-control" type="password" id="password" />

              <i class="bi bi-eye-slash" id="show_hide_password"></i>
            </div>

            <button type="submit" class="btn btn-outline-info">Login</button>
          </form>
        </div>
      </div>
    </div>
  </body>

  <script>
    const togglePassword = document.querySelector('#show_hide_password');
    const password = document.querySelector('#password');
    togglePassword.addEventListener('click', () => {
      // Toggle the type attribute using
      // getAttribure() method
      const type =
        password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      // Toggle the eye and bi-eye icon
      togglePassword.classList.toggle('bi-eye');
    });
  </script>
</html>
